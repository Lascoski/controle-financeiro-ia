services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile.backend
    container_name: gb_one_backend
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gb_one_network

  frontend: 
    build:
      context: ./
      dockerfile: Dockerfile.frontend
    container_name: gb_one_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gb_one_network  

  db:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: financas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gb_one_network

networks:
  gb_one_network:
    driver: bridge

volumes:
  postgres_data: